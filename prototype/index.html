<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelAgent — AI 旅行管家</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
  background:#1C1C1E;display:flex;justify-content:center;align-items:center;
  min-height:100vh;padding:16px;-webkit-font-smoothing:antialiased;
}

/* ===== Phone ===== */
.phone{
  width:390px;height:844px;background:#0A0A0A;border-radius:50px;padding:12px;
  box-shadow:0 0 0 2px #1a1a1a,0 0 0 5px #111,0 0 0 7px #1a1a1a,0 30px 80px rgba(0,0,0,0.5);
}
.phone-inner{
  width:100%;height:100%;background:#F2F2F7;border-radius:40px;overflow:hidden;
  position:relative;display:flex;flex-direction:column;
}

/* Island */
.island{position:absolute;top:9px;left:50%;transform:translateX(-50%);width:120px;height:32px;background:#000;border-radius:18px;z-index:200;}
.sbar{height:50px;padding:12px 28px 0;display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:600;color:#FFF;flex-shrink:0;position:relative;z-index:50;}
.sbar.dark{color:#000;}

/* ===== Screen ===== */
.scrs{flex:1;position:relative;overflow:hidden;}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;
  transform:translateX(105%);transition:transform .35s cubic-bezier(.32,.72,0,1);
  -webkit-overflow-scrolling:touch;}
.scr.on{transform:translateX(0);}
.scr::-webkit-scrollbar{width:0;}

/* ===== BG gradients ===== */
.bg-mountain{background:linear-gradient(170deg,#1a3a4a 0%,#2d5a6e 25%,#3d7a8e 45%,#5a9a9a 60%,#8bb8b0 80%,#c5d8c0 100%);}
.bg-beach{background:linear-gradient(170deg,#1a3a5c 0%,#2d6b8a 30%,#4a9ab5 50%,#7ec8c8 65%,#b8e0d8 80%,#e8f0e0 100%);}
.bg-sunset{background:linear-gradient(170deg,#2d1a3a 0%,#5c3a5c 25%,#8a5a6a 45%,#b87a7a 60%,#d8a898 75%,#f0d8c8 100%);}
.bg-lake{background:linear-gradient(170deg,#1a2a3a 0%,#2d4a6e 25%,#4a6a8e 45%,#7a9ab0 60%,#a8c0d0 75%,#d8e8f0 100%);}

/* ===== Shared components ===== */
.card{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:18px;padding:16px;}
.card-solid{background:#FFF;border-radius:18px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);}

.btn{display:flex;align-items:center;justify-content:center;height:46px;padding:0 20px;border-radius:23px;font-size:15px;font-weight:600;cursor:pointer;border:none;letter-spacing:-.2px;transition:all .12s;width:100%;}
.btn:active{transform:scale(.97);}
.btn-p{background:#2D9F89;color:#fff;}
.btn-p:active{background:#1B7A66;}
.btn-b{background:#1C1C1E;color:#fff;}
.btn-b:active{background:#3a3a3c;}
.btn-o{background:transparent;border:1.5px solid rgba(255,255,255,.5);color:#fff;}
.btn-ghost{background:transparent;color:#6B7280;font-weight:500;height:auto;padding:8px;}
.btn-sm{height:34px;font-size:13px;padding:0 16px;border-radius:17px;width:auto;}

.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;margin:0 1px;}
.tag-g{background:#D1FAE5;color:#065F46;}
.tag-y{background:#FEF3C7;color:#92400E;}
.tag-r{background:#FEE2E2;color:#991B1B;}
.tag-a{background:#F2F2F7;color:#6B7280;}

.toast{position:absolute;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:9px 18px;border-radius:20px;font-size:14px;z-index:300;opacity:0;pointer-events:none;transition:opacity .3s;}
.toast.on{opacity:1;}

/* Sheet */
.sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:250;opacity:0;pointer-events:none;transition:opacity .3s;display:flex;flex-direction:column;justify-content:flex-end;}
.sheet-bg.on{opacity:1;pointer-events:auto;}
.sheet{border-radius:24px 24px 0 0;max-height:82%;overflow-y:auto;transform:translateY(30px);transition:transform .38s cubic-bezier(.32,.72,0,1);}
.sheet-bg.on .sheet{transform:translateY(0);}

/* ===== Tab bar ===== */
.tab-bar{display:flex;justify-content:space-around;align-items:center;padding:6px 16px max(6px,env(safe-area-inset-bottom));background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid rgba(0,0,0,.06);flex-shrink:0;}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:#AEAEB2;cursor:pointer;padding:4px 12px;transition:color .2s;}
.tab.on{color:#2D9F89;}
.tab .ti{font-size:22px;}

/* ===== Bottom bar (fixed CTA) ===== */
.bb{padding:10px 16px max(10px,env(safe-area-inset-bottom));background:rgba(242,242,247,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;border-top:.5px solid rgba(0,0,0,.06);}

/* ===== P1: Home ===== */
.p1-hero{min-height:280px;display:flex;flex-direction:column;justify-content:flex-end;padding:50px 24px 16px;}
.p1-hero .greet{font-size:15px;color:rgba(255,255,255,.8);margin-bottom:4px;}
.p1-hero .tagline{font-size:32px;font-weight:700;color:#fff;letter-spacing:.1px;line-height:1.15;}
.p1-stats{display:flex;gap:24px;padding:0 24px 16px;}
.p1-stats .stat .n{font-size:22px;font-weight:700;color:#fff;}
.p1-stats .stat .l{font-size:12px;color:rgba(255,255,255,.7);}
.trip-h{display:flex;align-items:center;gap:12px;padding:14px;margin:0 16px 8px;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:14px;border:1px solid rgba(255,255,255,.15);cursor:pointer;color:#fff;}
.trip-h:active{transform:scale(.98);}
.trip-h .th-img{width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.trip-h .th-info{flex:1;min-width:0;}
.trip-h .th-name{font-size:16px;font-weight:600;}
.trip-h .th-date{font-size:12px;opacity:.7;margin-top:1px;}
.trip-h .th-badge{padding:3px 10px;border-radius:10px;font-size:10px;font-weight:600;background:rgba(255,255,255,.2);flex-shrink:0;}
.below-hero{background:#F2F2F7;border-radius:24px 24px 0 0;margin-top:-20px;padding-top:16px;}
.cta-green{background:#2D9F89;color:#fff;border-radius:18px;padding:16px;margin:0 16px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.cta-green:active{background:#1B7A66;}
.cta-green .cg-icon{font-size:30px;}
.cta-green .cg-text{flex:1;}
.cta-green .cg-title{font-size:17px;font-weight:700;}
.cta-green .cg-sub{font-size:12px;opacity:.8;}
.sec-t{padding:8px 20px 6px;font-size:12px;font-weight:600;color:#AEAEB2;text-transform:uppercase;letter-spacing:.5px;}
.row-i{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;border-bottom:.5px solid #F2F2F7;}
.row-i:last-child{border-bottom:none;}
.row-i:active{background:#F9F9FB;}
.row-i .ri-icon{font-size:22px;flex-shrink:0;}
.row-i .ri-info{flex:1;}
.row-i .ri-name{font-size:15px;font-weight:500;color:#1C1C1E;}
.row-i .ri-sub{font-size:12px;color:#6B7280;margin-top:1px;}

/* ===== P2: Chat ===== */
.p2-hero{min-height:140px;display:flex;flex-direction:column;justify-content:flex-end;padding:50px 20px 14px;}
.p2-hero .p2-t{font-size:26px;font-weight:700;color:#fff;}
.p2-hero .p2-s{font-size:13px;color:rgba(255,255,255,.7);margin-top:2px;}
.chat-area{flex:1;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:5px;background:#F2F2F7;}
.msg{max-width:84%;padding:10px 14px;font-size:15px;line-height:1.4;letter-spacing:-.2px;animation:mi .2s ease;}
@keyframes mi{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.msg.ai{align-self:flex-start;background:#E9E9ED;color:#000;border-radius:18px 18px 18px 4px;}
.msg.us{align-self:flex-end;background:#2D9F89;color:#fff;border-radius:18px 18px 4px 18px;}
.cfm{align-self:stretch;background:#E8F5F1;border-radius:16px;padding:14px;border:1.5px solid rgba(45,159,137,.2);margin:4px 0;}
.cfm h4{font-size:14px;font-weight:600;margin-bottom:6px;}
.cfm .fr{font-size:13px;margin-bottom:1px;display:flex;gap:4px;}
.cfm .fr .ok{color:#2D9F89;}
.cfm .fr .miss{color:#F59E0B;}
.cfm .cfm-btns{display:flex;gap:8px;margin-top:8px;}
.chat-input{display:flex;gap:8px;padding:8px 16px;background:rgba(242,242,247,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid rgba(0,0,0,.06);flex-shrink:0;}
.chat-input input{flex:1;height:38px;border-radius:19px;border:1px solid #E5E5EA;padding:0 14px;font-size:15px;background:#fff;outline:none;font-family:inherit;}
.chat-input input:focus{border-color:#2D9F89;}
.chat-input .snd{width:38px;height:38px;border-radius:50%;background:#2D9F89;border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.chat-input .snd:disabled{opacity:.3;}
.chat-input .snd:active{transform:scale(.92);}

/* ===== P3: Sort ===== */
.p3-hero{min-height:130px;display:flex;flex-direction:column;justify-content:flex-end;padding:50px 24px 14px;}
.p3-hero .p3-t{font-size:26px;font-weight:700;color:#fff;}
.p3-hero .p3-s{font-size:13px;color:rgba(255,255,255,.7);margin-top:2px;}
.sort-content{padding:0 16px;margin-top:-20px;}
.sort-tabs{display:flex;gap:6px;margin-bottom:10px;}
.sort-tabs button{height:32px;padding:0 14px;border-radius:16px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:#F2F2F7;color:#6B7280;}
.sort-tabs button.on{background:#2D9F89;color:#fff;}
.sort-item{display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:6px;background:#FFF;border-radius:14px;cursor:grab;user-select:none;box-shadow:0 1px 3px rgba(0,0,0,.03);}
.sort-item:active{cursor:grabbing;box-shadow:0 6px 16px rgba(0,0,0,.08);}
.sort-item .rk{width:26px;height:26px;border-radius:50%;background:#E8F5F1;color:#2D9F89;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.sort-item:first-child .rk{background:#2D9F89;color:#fff;}
.sort-item .di{flex:1;}
.sort-item .di .dn{font-size:14px;font-weight:600;color:#1C1C1E;}
.sort-item .di .de{font-size:11px;color:#6B7280;margin-top:1px;}
.sort-item .gr{font-size:15px;color:#AEAEB2;}

/* ===== P4: Compare ===== */
.p4-hero{min-height:90px;padding:50px 20px 14px;}
.p4-hero .p4-t{font-size:26px;font-weight:700;color:#fff;}
.compare-body{padding:12px 16px 0;}
.hero-card{background:#FFF;border-radius:18px;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.hero-card .verdict{font-size:16px;font-weight:600;color:#1C1C1E;margin-bottom:10px;}
.sb{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.sb .sn{width:30px;font-size:13px;font-weight:600;color:#1C1C1E;flex-shrink:0;}
.sb .st{flex:1;height:7px;background:#F2F2F7;border-radius:4px;overflow:hidden;}
.sb .sf{height:100%;border-radius:4px;transition:width 1s ease;width:0;}
.sb .sf.yn{background:#2D9F89;}
.sb .sf.xj{background:#AEAEB2;}
.sb .ss{font-size:22px;font-weight:700;color:#1C1C1E;width:28px;text-align:right;}
.reasons{margin-top:10px;}
.reasons .r{font-size:13px;color:#6B7280;margin-bottom:4px;line-height:1.5;display:flex;gap:4px;}
.reasons .r .n{color:#2D9F89;font-weight:700;flex-shrink:0;}
.dim-card{background:#FFF;border-radius:16px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.03);}
.dim-card .dt{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.dim-card .dt .dn{font-size:14px;font-weight:600;color:#1C1C1E;}
.dim-card .dt .dr{font-size:10px;color:#6B7280;background:#F2F2F7;padding:2px 8px;border-radius:8px;}
.dim-card .dv{display:flex;gap:6px;}
.dim-card .dv .vs{flex:1;text-align:center;padding:8px 4px;border-radius:10px;}
.dim-card .dv .vs.w{background:#E8F5F1;}
.dim-card .dv .vs .vsc{font-size:24px;font-weight:700;}
.dim-card .dv .vs .vnm{font-size:12px;font-weight:600;margin:1px 0;}
.dim-card .dv .vs .vwh{font-size:11px;color:#6B7280;line-height:1.3;}
.dim-card .src{font-size:10px;color:#AEAEB2;text-align:right;margin-top:4px;}
.risk-block{margin-bottom:10px;}
.risk-block .rtitle{font-size:13px;font-weight:600;color:#1C1C1E;margin-bottom:4px;}
.risk-block .ritem{font-size:12px;color:#6B7280;margin-bottom:3px;display:flex;gap:4px;}
.disclaimer{font-size:10px;color:#AEAEB2;text-align:center;padding:8px 0;}
.fb-row{display:flex;gap:14px;justify-content:center;padding:8px 0;}
.fb-row button{padding:7px 18px;border-radius:16px;font-size:13px;border:1.5px solid #E5E5EA;background:#fff;cursor:pointer;color:#6B7280;}
.fb-row button.up-on{border-color:#2D9F89;color:#2D9F89;background:#E8F5F1;}
.fb-row button.dn-on{border-color:#EF4444;color:#EF4444;background:#FEE2E2;}

/* ===== P5: Itinerary ===== */
.p5-hero{min-height:160px;display:flex;flex-direction:column;justify-content:flex-end;padding:50px 24px 14px;}
.p5-hero .p5-route{font-size:12px;color:rgba(255,255,255,.65);margin-bottom:2px;}
.p5-hero .p5-title{font-size:26px;font-weight:700;color:#fff;}
.p5-hero .p5-meta{font-size:13px;color:rgba(255,255,255,.7);margin-top:4px;}
.p5-hero .p5-warn{display:inline-block;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;margin-top:6px;background:rgba(0,0,0,.2);color:#fff;width:fit-content;}
.it-content{padding:0 16px 16px;margin-top:-20px;}
.day-c{background:#FFF;border-radius:16px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.03);}
.day-c .day-hd{padding:12px 14px;font-size:14px;font-weight:600;color:#1C1C1E;display:flex;justify-content:space-between;cursor:pointer;}
.day-c .day-hd .arr{color:#AEAEB2;font-size:12px;}
.day-c .day-bd{display:none;padding:0 14px 10px;}
.day-c .day-bd.open{display:block;}
.tl{display:flex;gap:8px;padding:8px 0;border-bottom:.5px solid #F2F2F7;align-items:flex-start;}
.tl:last-child{border-bottom:none;}
.tl .tlt{font-size:11px;color:#6B7280;width:38px;text-align:right;flex-shrink:0;}
.tl .tle{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.tl .tld{flex:1;font-size:13px;color:#1C1C1E;line-height:1.4;}
.tl .tld .tls{font-size:11px;color:#6B7280;display:block;}

/* ===== P6: Dashboard ===== */
.p6-hero{min-height:220px;display:flex;flex-direction:column;justify-content:flex-end;padding:50px 24px 16px;}
.p6-hero .p6-loc{font-size:14px;color:rgba(255,255,255,.7);}
.p6-hero .p6-day{font-size:28px;font-weight:700;color:#fff;margin-top:2px;}
.p6-hero .p6-next{font-size:13px;color:rgba(255,255,255,.65);margin-top:2px;}
.db-content{padding:0 16px 16px;margin-top:-20px;}
.strip-warn{background:rgba(254,243,199,.95);color:#92400E;padding:7px 14px;text-align:center;font-size:12px;font-weight:600;border-radius:12px;margin-bottom:10px;cursor:pointer;}
.qgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.qc{background:#FFF;border-radius:14px;padding:12px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.03);cursor:pointer;}
.qc .qi{font-size:24px;margin-bottom:2px;}
.qc .ql{font-size:10px;color:#AEAEB2;}
.qc .qv{font-size:13px;font-weight:600;color:#1C1C1E;margin-top:1px;}

/* ===== P8: Plan B ===== */
.p8-hero{min-height:90px;padding:50px 20px 14px;}
.p8-hero .p8-t{font-size:24px;font-weight:700;color:#fff;}
.p8-body{padding:12px 16px 0;}
.pbc{background:#FFF;border-radius:18px;padding:16px;margin-bottom:8px;cursor:pointer;border:2px solid transparent;box-shadow:0 1px 3px rgba(0,0,0,.03);transition:all .2s;}
.pbc.sel{border-color:#2D9F89;box-shadow:0 0 0 3px rgba(45,159,137,.08);}
.pbc .pbb{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;margin-bottom:6px;background:#E8F5F1;color:#2D9F89;}
.pbc .pbn{font-size:16px;font-weight:600;color:#1C1C1E;margin-bottom:4px;}
.pbc .pbm{font-size:12px;color:#6B7280;margin-bottom:4px;}
.pbc .pbr{font-size:12px;color:#6B7280;line-height:1.6;margin-top:6px;}
.pbc .pbd{font-size:11px;color:#AEAEB2;margin-top:6px;padding-top:6px;border-top:.5px solid #F2F2F7;}

/* ===== P9: Execution ===== */
.p9-hero{min-height:90px;padding:50px 20px 14px;}
.p9-hero .p9-t{font-size:24px;font-weight:700;color:#fff;}
.p9-body{padding:12px 16px 0;}
.update-card{background:#FEF3C7;border-radius:14px;padding:12px 14px;margin-bottom:10px;font-size:13px;color:#92400E;line-height:1.5;}
.step-row{display:flex;gap:10px;padding:12px 14px;border-bottom:.5px solid #F2F2F7;align-items:flex-start;}
.step-row .st-icon{font-size:20px;flex-shrink:0;}
.step-row .st-body{flex:1;}
.step-row .st-t{font-size:14px;font-weight:600;color:#1C1C1E;}
.step-row .st-s{font-size:12px;color:#6B7280;margin-top:1px;}
</style>
</head>
<body>

<div class="phone">
  <div class="phone-inner" id="app">
    <div class="island"></div>
    <div class="scrs" id="scrs"></div>
    <div class="sheet-bg" id="sheetBg" onclick="if(event.target===this)closeSheet()">
      <div class="sheet" id="sheetPanel"></div>
    </div>
    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
const S={
  scr:'p1',stack:['p1'],
  phase:'greet',round:0,
  fields:{dest:null,date:null,budget:null,party:null,from:null,interest:null},
  chatMsgs:[],
  sort:['孩子体验','预算控制','自然风光','美食','住宿舒适度','交通便利度'],
  selPB:null,dest:'yn'
};

function go(id){
  S.stack.push(id);S.scr=id;
  const ct=document.getElementById('scrs');
  ct.querySelectorAll('.scr.on').forEach(s=>{s.classList.remove('on');setTimeout(()=>{if(!s.classList.contains('on'))s.remove();},400);});
  let el=document.getElementById('s-'+id);
  if(!el){el=document.createElement('div');el.className='scr';el.id='s-'+id;ct.appendChild(el);}
  el.innerHTML=render(id);el.classList.add('on');closeSheet();
  if(id==='p2')setTimeout(()=>{const i=document.getElementById('ci');if(i)i.focus();},400);
  if(id==='p3')bindSort();
  if(id==='p4')setTimeout(()=>{document.querySelectorAll('.sb .sf').forEach(b=>b.style.width=b.dataset.w);},200);
  if(id==='p8')bindPB();
}
function back(){
  if(S.stack.length<=1)return;
  S.stack.pop();const id=S.stack[S.stack.length-1];S.scr=id;
  const ct=document.getElementById('scrs');
  ct.querySelectorAll('.scr.on').forEach(s=>{s.classList.remove('on');setTimeout(()=>{if(!s.classList.contains('on'))s.remove();},400);});
  let el=document.getElementById('s-'+id);
  if(!el){el=document.createElement('div');el.className='scr';el.id='s-'+id;ct.appendChild(el);}
  el.innerHTML=render(id);el.classList.add('on');closeSheet();
  if(id==='p3')bindSort();
  if(id==='p4')setTimeout(()=>{document.querySelectorAll('.sb .sf').forEach(b=>b.style.width=b.dataset.w);},200);
}
function closeSheet(){document.getElementById('sheetBg').classList.remove('on');}
function openSheet(h){document.getElementById('sheetPanel').innerHTML='<div class="hnd"></div><div class="sc">'+h+'</div>';document.getElementById('sheetBg').classList.add('on');}

function P2(){

  }
  if(S.phase==='prefs'){
    extra+=`<div class="msg ai"><strong>🎯 根据你的描述，你在意：</strong><br><br>① 孩子体验<br>② 预算控制<br>③ 自然风光<br>④ 美食<br>⑤ 住宿<br>⑥ 交通</div>`;
  }
  return`
<div class="bg-beach" style="flex-shrink:0;"><div class="sbar">9:41</div><div class="p2-hero"><div class="p2-t">聊聊你的旅行</div><div class="p2-s">AI 旅行管家为你规划</div></div></div>
<div class="chat-area" id="ca">${msgs}${extra}</div>
${S.phase==='prefs'?`<div class="bb"><button class="btn btn-p" onclick="go('p3')">✨ 排优先级 →</button></div>`:`<div class="chat-input"><input id="ci" placeholder="输入你的想法..." onkeydown="if(event.key==='Enter')sendMsg()"><button class="snd" onclick="sendMsg()">↑</button></div>`}`;
}

function sendMsg(){
  const inp=document.getElementById('ci');if(!inp)return;
  const txt=inp.value.trim();if(!txt)return;inp.value='';
  S.chatMsgs.push({role:'us',text:txt});processChat(txt);
  const el=document.getElementById('s-p2');if(el){el.innerHTML=render('p2');setTimeout(()=>{const ca=document.getElementById('ca');if(ca)ca.scrollTop=ca.scrollHeight;const i2=document.getElementById('ci');if(i2)i2.focus();},100);}
}
function processChat(input){
  S.round++;
  if(!S.fields.dest&&(input.includes('新疆')||input.includes('云南')||input.includes('西双版纳')))S.fields.dest='新疆、云南';
  if(!S.fields.date&&(input.includes('月')||input.includes('天')||input.includes('暑假')))S.fields.date='7月15日-30日（15天）';
  if(!S.fields.budget&&(input.includes('预算')||input.includes('元')||input.includes('15000')))S.fields.budget='15000元';
  if(!S.fields.party&&(input.includes('孩子')||input.includes('家庭')))S.fields.party='2成人+1儿童';
  if(!S.fields.from&&(input.includes('上海')||input.includes('出发')))S.fields.from='上海';
  if(!S.fields.interest&&(input.includes('喜欢')||input.includes('抓虫')||input.includes('美食')||input.includes('昆虫')))S.fields.interest='昆虫探索、自然风光、美食';
  const missing=[!S.fields.dest,!S.fields.date,!S.fields.budget].filter(Boolean);
  if(missing.length>0&&S.round<4){
    const prompts={dest:'你有想好的目的地吗？比如新疆、云南？',date:'大概什么时候出发？玩几天？',budget:'预算大概多少？包含机票酒店吗？',party:'几个人去？有老人小孩吗？',interest:'喜欢什么类型？自然风光、人文、美食？',from:'从哪个城市出发？'};
    const next=!S.fields.dest?'dest':!S.fields.date?'date':!S.fields.budget?'budget':!S.fields.party?'party':!S.fields.interest?'interest':'from';
    S.phase='ask_'+next;S.chatMsgs.push({role:'ai',text:prompts[next]});
  }else{S.phase='confirm';S.chatMsgs.push({role:'ai',text:'好的，我帮你整理了一下，你看看？'});}
}
function confirmReq(){S.phase='prefs';toast('需求已确认 ✅');go('p2');}

function ev(d){const m={'孩子体验':'"想去西双版纳抓虫"','预算控制':'"绝对不能超15000"','自然风光':'"我想看雪山"','美食':'"必须尝当地"','住宿舒适度':'"干净就行"','交通便利度':'"中转也接受"'};return m[d]||'';}
function renderSorts(){return S.sort.map((d,i)=>`<div class="sort-item" draggable="true" data-idx="${i}"><div class="rk">${i+1}</div><div class="di"><div class="dn">${d}</div><div class="de">${ev(d)}</div></div><div class="gr">≡</div></div>`).join('');}
function sm(m,el){
  document.querySelectorAll('.sort-tabs button').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  if(m==='ai'){S.sort=['孩子体验','预算控制','美食','自然风光','住宿舒适度','交通便利度'];document.getElementById('sl').innerHTML=renderSorts();bindSort();toast('🤖 AI已排序，可手动调整');}

}
function bindSort(){
  document.querySelectorAll('#sl .sort-item').forEach(item=>{
    item.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',e.currentTarget.dataset.idx);e.currentTarget.style.opacity='0.5';});
    item.addEventListener('dragend',e=>{e.currentTarget.style.opacity='1';});
    item.addEventListener('dragover',e=>{e.preventDefault();});
    item.addEventListener('drop',e=>{e.preventDefault();const toEl=e.target.closest('.sort-item');if(!toEl)return;const from=parseInt(e.dataTransfer.getData('text/plain'));const to=parseInt(toEl.dataset.idx);if(from!==to&&!isNaN(from)&&!isNaN(to)){const[mv]=S.sort.splice(from,1);S.sort.splice(to,0,mv);document.getElementById('sl').innerHTML=renderSorts();bindSort();}});
  });
}
